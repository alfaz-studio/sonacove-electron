<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonacove</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #1a1a2e;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    user-select: none;
    color: #fff;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 32px;
  }
  .icon {
    width: 72px; height: 72px;
    margin-bottom: 32px;
  }
  .icon img {
    width: 100%; height: 100%;
    object-fit: contain;
    border-radius: 12px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    text-align: center;
  }
  .subtitle {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    text-align: center;
    line-height: 1.5;
    max-width: 360px;
    margin-bottom: 32px;
  }
  .retry-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
    -webkit-app-region: no-drag;
  }
  .retry-btn:hover {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.25);
  }
  .retry-btn:active {
    background: rgba(255,255,255,0.08);
  }
  .retry-btn.loading {
    pointer-events: none;
    opacity: 0.6;
  }
  .error-code {
    position: absolute;
    bottom: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
  }
</style>
</head>
<body>
<div class="container">
  <!-- Icon path assumes resources/ is inside the ASAR (default electron-builder behavior).
       If asar.unpack ever moves resources/ outside, this will silently fail (onerror hides it). -->
  <div class="icon"><img src="../resources/icon.png" alt="Sonacove" onerror="this.style.display='none'"></div>
  <h1 id="heading">Unable to connect</h1>
  <p class="subtitle" id="subtitle">Something went wrong while loading Sonacove. Please try again.</p>
  <button class="retry-btn" id="retryBtn" onclick="retry()">Try Again</button>
  <span class="error-code" id="errorCode"></span>
</div>
<script>
  var params = new URLSearchParams(window.location.search);
  var code = parseInt(params.get('code'), 10) || 0;
  var desc = params.get('desc') || '';

  var heading = document.getElementById('heading');
  var subtitle = document.getElementById('subtitle');
  var errorCodeEl = document.getElementById('errorCode');

  // Map error codes to user-friendly messages
  if (code === -106 || code === -105 || code === -109 || desc.indexOf('INTERNET') !== -1) {
    heading.textContent = 'You appear to be offline';
    subtitle.textContent = 'Check your internet connection and try again.';
  } else if (code === -102 || code === -118 || code === -101) {
    heading.textContent = 'Server is unreachable';
    subtitle.textContent = 'Sonacove might be temporarily unavailable. Please try again in a moment.';
  } else if (desc.indexOf('CERT') !== -1 || desc.indexOf('SSL') !== -1) {
    heading.textContent = 'Connection security error';
    subtitle.textContent = 'A secure connection could not be established. Please try again later.';
  }

  if (desc) {
    errorCodeEl.textContent = desc + ' (' + code + ')';
  }

  function retry() {
    var btn = document.getElementById('retryBtn');
    btn.textContent = 'Connecting\u2026';
    btn.classList.add('loading');
    if (window.sonacoveElectronAPI && window.sonacoveElectronAPI.ipc) {
      window.sonacoveElectronAPI.ipc.send('retry-load');
    }
  }
</script>
</body>
</html>
