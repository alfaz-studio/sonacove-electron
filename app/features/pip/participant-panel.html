<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Participants</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Panel ──────────────────────────────────────────────────────────── */
    .panel {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: rgba(20, 20, 20, 0.9);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.04);
      overflow: hidden;
      opacity: 1;
      transform: scale(1);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .panel.hiding {
      opacity: 0;
      transform: scale(0.85);
    }

    .panel.hidden {
      display: none;
    }

    /* ── Tiles Container ────────────────────────────────────────────────── */
    .tiles-container {
      flex: 1;
      display: flex;
      flex-direction: row;
      gap: 6px;
      padding: 6px;
      overflow: hidden;
    }

    .tiles-container.vertical {
      flex-direction: column;
    }

    /* ── Tile ───────────────────────────────────────────────────────────── */
    .tile {
      width: 200px;
      height: 130px;
      background: #040404;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .tiles-container.vertical .tile {
      width: 200px;
      height: 160px;
    }

    .tile-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .tile-avatar {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #040404;
    }

    .tile-avatar-img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }

    .tile-avatar-initials {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .tile-avatar-fallback {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.5);
    }

    .tile-name-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 32px;
      background: linear-gradient(to bottom, transparent, rgba(4, 4, 4, 0.93));
      padding: 0 8px 6px;
      display: flex;
      align-items: flex-end;
    }

    .tiles-container.vertical .tile-name-bar {
      height: 34px;
    }

    .tile-name {
      font-size: 11px;
      font-weight: 600;
      color: #FFFFFF;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Control Bar ────────────────────────────────────────────────────── */
    .control-bar {
      height: 32px;
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      flex-shrink: 0;
      user-select: none;
    }

    .control-left {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #858585;
    }

    .control-left svg {
      flex-shrink: 0;
    }

    .participant-count {
      font-size: 11px;
      font-weight: 400;
      color: #858585;
    }

    .control-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ctrl-btn {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.12s;
      flex-shrink: 0;
    }

    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    /* ── Pill Mode ──────────────────────────────────────────────────────── */
    .pill-overlay {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
    }

    .pill-overlay.active {
      display: flex;
    }

    .pill-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(to bottom, #6C5CE7, #4834D4);
      color: #FFFFFFEE;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(108, 92, 231, 0.2), 0 8px 32px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.2s ease, transform 0.2s ease;
      position: relative;
    }

    .pill-btn.visible {
      opacity: 1;
      transform: scale(1);
    }

    .pill-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 20px;
      height: 20px;
      background: #E04848;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.27);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .pill-badge.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <!-- Tiles -->
    <div class="tiles-container" id="tilesContainer"></div>

    <!-- Control Bar -->
    <div class="control-bar">
      <div class="control-left">
        <span id="gripIcon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="1"/><circle cx="19" cy="9" r="1"/><circle cx="5" cy="9" r="1"/><circle cx="12" cy="15" r="1"/><circle cx="19" cy="15" r="1"/><circle cx="5" cy="15" r="1"/></svg>
        </span>
        <span class="participant-count" id="participantCount">0 participants</span>
      </div>
      <div class="control-right">
        <button class="ctrl-btn" id="toggleBtn" title="Toggle layout">
          <span id="toggleIcon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 3v18"/></svg>
          </span>
        </button>
        <button class="ctrl-btn" id="closeBtn" title="Minimize to pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Pill -->
  <div class="pill-overlay" id="pillOverlay">
    <button class="pill-btn" id="pillBtn" title="Show Participants">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span class="pill-badge hidden" id="pillBadge">0</span>
    </button>
  </div>

  <script>
    (function () {
      var panel = document.getElementById('panel');
      var tilesContainer = document.getElementById('tilesContainer');
      var closeBtn = document.getElementById('closeBtn');
      var toggleBtn = document.getElementById('toggleBtn');
      var toggleIcon = document.getElementById('toggleIcon');
      var gripIcon = document.getElementById('gripIcon');
      var participantCountEl = document.getElementById('participantCount');
      var pillOverlay = document.getElementById('pillOverlay');
      var pillBtn = document.getElementById('pillBtn');
      var pillBadge = document.getElementById('pillBadge');

      // SVG templates
      var GRIP_HORIZONTAL = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="9" r="1"/><circle cx="19" cy="9" r="1"/><circle cx="5" cy="9" r="1"/><circle cx="12" cy="15" r="1"/><circle cx="19" cy="15" r="1"/><circle cx="5" cy="15" r="1"/></svg>';
      var GRIP_VERTICAL = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>';
      var TOGGLE_COLUMNS = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 3v18"/></svg>';
      var TOGGLE_ROWS = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 12h18"/></svg>';
      var USER_FALLBACK = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';

      var currentOrientation = 'horizontal';
      var participants = [];
      var isPillMode = false;

      // ── Orientation helpers ──────────────────────────────────────────────
      function applyOrientation() {
        if (currentOrientation === 'vertical') {
          tilesContainer.classList.add('vertical');
        } else {
          tilesContainer.classList.remove('vertical');
        }

        gripIcon.innerHTML = currentOrientation === 'horizontal' ? GRIP_HORIZONTAL : GRIP_VERTICAL;

        // Toggle icon shows what you'll switch TO
        if (currentOrientation === 'horizontal') {
          toggleIcon.innerHTML = TOGGLE_COLUMNS;
          toggleBtn.title = 'Switch to vertical layout';
        } else {
          toggleIcon.innerHTML = TOGGLE_ROWS;
          toggleBtn.title = 'Switch to horizontal layout';
        }
      }

      // ── Tile rendering ───────────────────────────────────────────────────
      function renderTiles() {
        var existingTiles = tilesContainer.querySelectorAll('.tile');
        var existingMap = {};
        for (var i = 0; i < existingTiles.length; i++) {
          existingMap[existingTiles[i].getAttribute('data-participant-id')] = existingTiles[i];
        }

        var newIds = {};
        for (var j = 0; j < participants.length; j++) {
          newIds[participants[j].id] = true;
        }

        // Remove tiles for participants no longer present
        for (var id in existingMap) {
          if (!newIds[id]) {
            existingMap[id].remove();
          }
        }

        // Add or update tiles
        for (var k = 0; k < participants.length; k++) {
          var p = participants[k];
          var tile = existingMap[p.id];

          if (!tile) {
            tile = createTile(p);
            tilesContainer.appendChild(tile);
          } else {
            updateTile(tile, p);
          }
        }
      }

      function createTile(p) {
        var tile = document.createElement('div');
        tile.className = 'tile';
        tile.setAttribute('data-participant-id', p.id);

        var videoImg = document.createElement('img');
        videoImg.className = 'tile-video';
        videoImg.draggable = false;
        videoImg.alt = '';
        tile.appendChild(videoImg);

        var avatarDiv = document.createElement('div');
        avatarDiv.className = 'tile-avatar';
        tile.appendChild(avatarDiv);

        var nameBar = document.createElement('div');
        nameBar.className = 'tile-name-bar';
        var nameSpan = document.createElement('span');
        nameSpan.className = 'tile-name';
        nameBar.appendChild(nameSpan);
        tile.appendChild(nameBar);

        updateTile(tile, p);
        return tile;
      }

      function updateTile(tile, p) {
        var videoImg = tile.querySelector('.tile-video');
        var avatarDiv = tile.querySelector('.tile-avatar');
        var nameSpan = tile.querySelector('.tile-name');

        nameSpan.textContent = p.name || '';

        // If has video and video img is already showing a frame, keep showing it.
        // If hasVideo is false, hide video and show avatar.
        if (!p.hasVideo) {
          videoImg.style.display = 'none';
          avatarDiv.style.display = 'flex';
        }
        // When hasVideo is true, we wait for actual frames to show the video img.

        // Update avatar content
        renderAvatar(avatarDiv, p);
      }

      function renderAvatar(container, p) {
        container.innerHTML = '';

        if (p.avatarURL) {
          var img = document.createElement('img');
          img.className = 'tile-avatar-img';
          img.src = p.avatarURL;
          img.alt = p.name || '';
          img.onerror = function () {
            // Fallback to initials on load error
            container.innerHTML = '';
            appendInitialsOrFallback(container, p);
          };
          container.appendChild(img);
        } else {
          appendInitialsOrFallback(container, p);
        }
      }

      function appendInitialsOrFallback(container, p) {
        if (p.initials) {
          var initialsDiv = document.createElement('div');
          initialsDiv.className = 'tile-avatar-initials';
          initialsDiv.textContent = p.initials;
          initialsDiv.style.backgroundColor = p.avatarColor || '#555';
          container.appendChild(initialsDiv);
        } else {
          var fallback = document.createElement('div');
          fallback.className = 'tile-avatar-fallback';
          fallback.innerHTML = USER_FALLBACK;
          container.appendChild(fallback);
        }
      }

      // ── Participant count ────────────────────────────────────────────────
      function updateParticipantCount() {
        var count = participants.length;
        participantCountEl.textContent = count + (count === 1 ? ' participant' : ' participants');

        // Update pill badge
        if (count > 0) {
          pillBadge.textContent = count;
          pillBadge.classList.remove('hidden');
        } else {
          pillBadge.classList.add('hidden');
        }
      }

      // ── API callbacks ────────────────────────────────────────────────────
      window.panelAPI.onParticipantsUpdate(function (data) {
        participants = data;
        renderTiles();
        updateParticipantCount();
      });

      window.panelAPI.onFrame(function (frameData) {
        var id = frameData.id;
        var data = frameData.data;
        var tile = tilesContainer.querySelector('.tile[data-participant-id="' + id + '"]');
        if (!tile) return;

        var videoImg = tile.querySelector('.tile-video');
        var avatarDiv = tile.querySelector('.tile-avatar');

        videoImg.src = data;
        videoImg.style.display = 'block';
        avatarDiv.style.display = 'none';
      });

      window.panelAPI.onOrientationChanged(function (orientation) {
        currentOrientation = orientation;
        applyOrientation();
      });

      window.panelAPI.onEnterPillMode(function () {
        isPillMode = true;
        // Animate panel out, then show pill
        panel.classList.add('hiding');
        setTimeout(function () {
          panel.classList.add('hidden');
          panel.classList.remove('hiding');
          pillOverlay.classList.add('active');
          requestAnimationFrame(function () {
            pillBtn.classList.add('visible');
          });
        }, 200);
      });

      window.panelAPI.onEnterPanelMode(function () {
        isPillMode = false;
        // Animate pill out, then show panel
        pillBtn.classList.remove('visible');
        setTimeout(function () {
          pillOverlay.classList.remove('active');
          panel.classList.remove('hidden');
          // Animate panel in from scaled-down state
          panel.classList.add('hiding');
          requestAnimationFrame(function () {
            panel.classList.remove('hiding');
          });
        }, 200);
      });

      // ── Control bar buttons ──────────────────────────────────────────────
      closeBtn.addEventListener('click', function () {
        window.panelAPI.close();
      });

      toggleBtn.addEventListener('click', function () {
        window.panelAPI.toggleOrientation();
      });

      // ── Pill drag logic ──────────────────────────────────────────────────
      var DRAG_THRESHOLD = 5; // px — ignore micro-movements during a click
      var pillDragging = false;
      var pillStartX = 0;
      var pillStartY = 0;
      var pillMoved = false;

      pillBtn.addEventListener('mousedown', function (e) {
        if (e.button !== 0) return;
        pillDragging = true;
        pillMoved = false;
        pillStartX = e.screenX;
        pillStartY = e.screenY;
        window.panelAPI.startWindowDrag();
        e.preventDefault();
      });

      window.addEventListener('mousemove', function (e) {
        if (!pillDragging || pillMoved) return;
        var dx = Math.abs(e.screenX - pillStartX);
        var dy = Math.abs(e.screenY - pillStartY);
        if (dx > DRAG_THRESHOLD || dy > DRAG_THRESHOLD) {
          pillMoved = true;
        }
      });

      window.addEventListener('mouseup', function () {
        if (!pillDragging) return;
        pillDragging = false;
        window.panelAPI.stopWindowDrag();
        if (!pillMoved) {
          window.panelAPI.reopen();
        }
      });

      // ── Init ─────────────────────────────────────────────────────────────
      applyOrientation();
      updateParticipantCount();
    })();
  </script>
</body>
</html>
